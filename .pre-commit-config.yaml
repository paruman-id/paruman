repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json

  - repo: local
    hooks:
      - id: rust-fmt
        name: Rust Format
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: rust-clippy
        name: Rust Clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: svelte-check
        name: Svelte Check
        entry: npm run check
        language: system
        types: [svelte, typescript, javascript]
        pass_filenames: false
        stages: [commit]
        exclude: ^(frontend/node_modules|target)
