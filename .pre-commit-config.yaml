repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json

  - repo: local
    hooks:
      - id: rust-fmt
        name: Rust Format
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: rust-clippy
        name: Rust Clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: svelte-check
        name: Svelte Check
        entry: npm run check
        language: system
        types: [svelte, typescript, javascript]
        pass_filenames: false
        stages: [commit]
        exclude: ^(frontend/node_modules|target)

      - id: ink-contract-check
        name: ink! Contract Check
        entry: cargo contract check
        language: system
        files: ^contracts/.*\.rs$
        pass_filenames: false
        stages: [commit]

      - id: ink-contract-build
        name: ink! Contract Build
        entry: cargo contract build
        language: system
        files: ^contracts/.*\.rs$
        pass_filenames: false
        stages: [commit]

      - id: foundry-fmt
        name: Foundry Format (Solidity)
        entry: forge fmt
        language: system
        files: ^contracts/.*\.sol$
        pass_filenames: false
        stages: [commit]

      - id: foundry-test
        name: Foundry Test (Solidity)
        entry: forge test
        language: system
        files: ^contracts/.*\.sol$
        pass_filenames: false
        stages: [commit]
